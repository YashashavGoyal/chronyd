<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter - Utiqx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        background: '#030303',
                        surface: '#0a0a0a',
                        border: '#1f1f22',
                        primary: '#ededed',
                        muted: '#878787'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030303; color: #ededed; }
        .glass-panel {
            background: rgba(10, 10, 10, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .input-field {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: rgba(255, 255, 255, 0.3);
            outline: none;
        }
    </style>
</head>
<body class="antialiased h-screen flex overflow-hidden">

    <!-- Sidebar (Simplified for mockup) -->
    <aside class="w-64 border-r border-border bg-black/50 flex flex-col h-full z-20 shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-border/50">
            <div class="w-7 h-7 bg-white rounded flex items-center justify-center mr-3"><i data-lucide="command" class="w-4 h-4 text-black"></i></div>
            <span class="font-bold tracking-tight text-lg">Utiqx</span>
        </div>
        <div class="p-4 space-y-1">
            <a href="design-review.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-muted hover:text-white transition-colors">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
            </a>
            <div class="pt-4 pb-2 px-3"><p class="text-xs font-semibold text-muted uppercase">Dev Tools</p></div>
            <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm bg-white/10 text-white font-medium">
                <i data-lucide="code-2" class="w-4 h-4 text-amber-400"></i> JSON Formatter
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-muted hover:text-white transition-colors">
                <i data-lucide="binary" class="w-4 h-4"></i> Base64 Converter
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative z-10 overflow-hidden bg-gradient-to-br from-[#030303] to-[#0a0a0a]">
        <!-- Topbar -->
        <header class="h-16 flex items-center justify-between px-8 border-b border-white/[0.02]">
            <div class="flex items-center text-sm font-medium text-muted">
                <span>Dev Tools</span><i data-lucide="chevron-right" class="w-4 h-4 mx-1 opacity-50"></i><span class="text-primary">JSON Formatter</span>
            </div>
            
            <div class="flex items-center gap-3">
                <button class="bg-white/5 border border-white/10 text-primary px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-white/10 transition-colors flex items-center gap-2">
                    <i data-lucide="minimize-2" class="w-4 h-4"></i> Minify
                </button>
                <button class="bg-white text-black px-4 py-1.5 rounded-lg text-sm font-semibold hover:opacity-90 transition-opacity flex items-center gap-2">
                    <i data-lucide="check" class="w-4 h-4"></i> Format & Validate
                </button>
            </div>
        </header>

        <!-- Tool Workspace -->
        <div class="flex-1 overflow-hidden flex flex-col p-6">
            <div class="flex-1 flex gap-6 min-h-0">
                
                <!-- Main Editor Area -->
                <div class="flex-[3] flex flex-col gap-4 min-h-0">
                    <div class="glass-panel rounded-2xl flex flex-col overflow-hidden relative group border-amber-500/20 flex-1">
                        <div class="absolute inset-0 bg-gradient-to-br from-amber-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
                        <div class="h-12 border-b border-white/5 bg-black/40 flex items-center px-4 justify-between relative z-10">
                            <span class="text-xs font-bold uppercase tracking-wider text-amber-400 flex items-center gap-2"><i data-lucide="file-json" class="w-4 h-4"></i> Input Data</span>
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] font-mono text-muted bg-white/5 px-2 py-0.5 rounded border border-white/5">Size: 142 B</span>
                                <button class="text-muted hover:text-white transition-colors" title="Clear"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        
                        <div class="flex-1 flex relative z-10 overflow-hidden">
                            <!-- Line Numbers -->
                            <div class="w-12 border-r border-white/5 bg-black/20 flex flex-col items-end py-6 pr-3 font-mono text-xs text-muted/40 select-none">
                                <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
                            </div>
                            <!-- Textarea -->
                            <textarea class="flex-1 bg-transparent border-none outline-none resize-none p-6 pt-5 font-mono text-[13px] leading-relaxed text-primary custom-scrollbar" spellcheck="false" placeholder="Paste your messy JSON here...">{
  "status": "success",
  "data": {
    "user": {
      "id": 123,
      "email": "test@example.com"
    },
    "roles": ["admin", "editor"]
  },
  "timestamp": 1698765432
}</textarea>
                        </div>
                    </div>
                </div>

                <!-- Right Sidebar: Configuration -->
                <div class="flex-1 max-w-[300px] flex flex-col gap-4 min-h-0">
                    <div class="glass-panel rounded-2xl p-5 flex flex-col h-full overflow-y-auto custom-scrollbar">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-primary mb-6">Configuration</h3>
                        
                        <div class="space-y-6">
                            <!-- Indentation -->
                            <div>
                                <label class="text-xs font-semibold text-muted mb-3 block">Indentation</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <button class="bg-white/10 border border-white/20 text-white py-2 rounded-lg text-xs font-medium">2 Spaces</button>
                                    <button class="bg-black/50 border border-white/5 text-muted hover:text-white py-2 rounded-lg text-xs font-medium transition-colors">4 Spaces</button>
                                    <button class="bg-black/50 border border-white/5 text-muted hover:text-white py-2 rounded-lg text-xs font-medium transition-colors">Tab</button>
                                    <button class="bg-black/50 border border-white/5 text-muted hover:text-white py-2 rounded-lg text-xs font-medium transition-colors">Minify</button>
                                </div>
                            </div>
                            
                            <!-- Options -->
                            <div>
                                <label class="text-xs font-semibold text-muted mb-3 block">Parse Options</label>
                                <label class="flex items-center gap-3 p-3 rounded-xl bg-black/30 border border-white/5 cursor-pointer hover:bg-black/50 transition-colors mb-2">
                                    <input type="checkbox" checked class="accent-amber-500 w-4 h-4">
                                    <span class="text-sm text-primary">Sort Keys Alphabetically</span>
                                </label>
                                <label class="flex items-center gap-3 p-3 rounded-xl bg-black/30 border border-white/5 cursor-pointer hover:bg-black/50 transition-colors">
                                    <input type="checkbox" class="accent-amber-500 w-4 h-4">
                                    <span class="text-sm text-primary">Unescape Unicode</span>
                                </label>
                            </div>
                        </div>

                        <div class="mt-auto pt-6">
                            <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex gap-3">
                                <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-400 shrink-0"></i>
                                <div>
                                    <p class="text-sm font-semibold text-emerald-400">Valid JSON</p>
                                    <p class="text-xs text-emerald-400/70 mt-1">Parsed successfully in 2ms.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
